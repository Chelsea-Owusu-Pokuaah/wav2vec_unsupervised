hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    hydra_help: ???
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
  output_subdir: .hydra
  overrides:
    hydra: []
    task:
    - fairseq.common.user_dir=/home/chels/NLP/wav2vec_unsupervised/fairseq_/examples/wav2vec/unsupervised
    - fairseq.task.data=/home/chels/NLP/wav2vec_unsupervised/data/clustering/librispeech/precompute_pca512_cls128_mean_pooled
    - fairseq.common_eval.path=/home/chels/NLP/wav2vec_unsupervised/outputs/2026-04-10/12-59-18/checkpoint_best.pt
    - fairseq.task.text_data=/home/chels/NLP/wav2vec_unsupervised/data/text/phones/
    - fairseq.task.kenlm_path=/home/chels/NLP/wav2vec_unsupervised/data/text/phones/lm.phones.filtered.04.bin
    - results_path=/tmp/w2vu_eval_test
    - fairseq.dataset.gen_subset=test
    - fairseq.dataset.batch_size=1
    - fairseq.dataset.num_workers=0
    - fairseq.dataset.required_batch_size_multiple=1
  job:
    name: w2vu_generate
    override_dirname: fairseq.common.user_dir=/home/chels/NLP/wav2vec_unsupervised/fairseq_/examples/wav2vec/unsupervised,fairseq.common_eval.path=/home/chels/NLP/wav2vec_unsupervised/outputs/2026-04-10/12-59-18/checkpoint_best.pt,fairseq.dataset.batch_size=1,fairseq.dataset.gen_subset=test,fairseq.dataset.num_workers=0,fairseq.dataset.required_batch_size_multiple=1,fairseq.task.data=/home/chels/NLP/wav2vec_unsupervised/data/clustering/librispeech/precompute_pca512_cls128_mean_pooled,fairseq.task.kenlm_path=/home/chels/NLP/wav2vec_unsupervised/data/text/phones/lm.phones.filtered.04.bin,fairseq.task.text_data=/home/chels/NLP/wav2vec_unsupervised/data/text/phones/,results_path=/tmp/w2vu_eval_test
    id: ???
    num: ???
    config_name: viterbi
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
